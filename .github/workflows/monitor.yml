name: 🎯 基金溢价监控

on:
  # 定时触发器：每3分钟运行一次（使用UTC时间）
  schedule:
    - cron: '*/3 * * * *'
  
  # 手动触发器：允许在GitHub网页上手动运行
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    node-version: '22'  # 新增：指定Node.js版本，解决弃用警告
    
    steps:
      # 步骤1: 获取代码
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4
      
      # 步骤2: 设置Python环境
      - name: 🐍 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      # 步骤3: 安装Python依赖包
      - name: 📦 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 步骤4: 运行监控脚本
      - name: 🚀 执行基金监控
        env:
          # 从GitHub Secrets读取飞书Webhook地址（保护隐私）
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python monitor.py
      
      # 步骤5: 保存运行日志（用于问题排查）
      - name: 📄 上传运行日志
        if: always()  # 无论成功失败都执行
        uses: actions/upload-artifact@v4
        with:
          name: 监控日志-${{ github.run_number }}
          path: |
            **/*.log
          if-no-files-found: ignore  # 新增：如果没找到日志文件也不报错
          retention-days: 7
